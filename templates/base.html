<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Controle de Créditos{% endblock %}</title>
<style>
:root{--bg:#eef3ff;--panel:#ffffff;--panel-soft:#f8fbff;--text:#111827;--muted:#6b7280;--line:#e8eefc;--blue-1:#0a4dff;--blue-2:#0038d9;--blue-3:#1f6bff;--shadow:0 18px 40px rgba(41,72,152,.14);--success:#166534;--success-bg:#dcfce7;--error:#991b1b;--error-bg:#fee2e2}
*{box-sizing:border-box} html,body{height:100%}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top left, rgba(41,106,255,.10), transparent 30%),radial-gradient(circle at bottom right, rgba(0,56,217,.08), transparent 35%), var(--bg);color:var(--text)}
.app{min-height:100vh;display:grid;grid-template-columns:270px 1fr;gap:24px;padding:28px}
.sidebar{background:linear-gradient(180deg,var(--blue-1),var(--blue-2));border-radius:28px;color:#fff;padding:28px 22px;box-shadow:var(--shadow);display:flex;flex-direction:column;min-height:calc(100vh - 56px);position:sticky;top:28px}
.brand{font-size:30px;font-weight:700;margin-bottom:30px}.menu{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.menu-item{display:flex;align-items:center;gap:12px;border-radius:18px;padding:14px 16px;color:rgba(255,255,255,.92);text-decoration:none;font-size:16px}
.menu-item.active{background:#fff;color:var(--blue-2);font-weight:700;box-shadow:0 12px 24px rgba(0,0,0,.12)} .menu-icon{width:18px;height:18px;border-radius:6px;border:2px solid currentColor;opacity:.9}
.sidebar-footer{margin-top:auto;font-size:13px;color:rgba(255,255,255,.82);line-height:1.6}
.main{background:rgba(255,255,255,.55);border-radius:32px;padding:22px}.panel{background:var(--panel);border-radius:28px;box-shadow:var(--shadow);overflow:hidden}
.topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding:26px 28px 18px;border-bottom:1px solid var(--line)}
.title h1{margin:0;font-size:34px;line-height:1.1}.title p{margin:8px 0 0;color:var(--muted);font-size:15px}
.top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.chip{background:var(--panel-soft);border:1px solid var(--line);color:#374151;padding:10px 14px;border-radius:14px;font-size:13px}
.filters,.section{padding:18px 28px 0}
.filters form{display:grid;grid-template-columns:repeat(5,minmax(0,1fr)) auto;gap:12px;align-items:end}
.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:12px;color:var(--muted);font-weight:700}
.input,.select{min-width:0;border:1px solid var(--line);background:#fff;padding:12px 14px;border-radius:14px}
.btn{border:0;background:linear-gradient(135deg,var(--blue-1),var(--blue-3));color:#fff;border-radius:14px;padding:12px 18px;font-weight:700;cursor:pointer;box-shadow:0 12px 24px rgba(10,77,255,.22);text-decoration:none;display:inline-block}
.btn.secondary{background:#fff;color:var(--blue-2);border:1px solid var(--line);box-shadow:none}
.content{padding:18px 22px 24px}.alert{border-radius:16px;padding:14px 16px;font-size:14px}.alert.error{background:var(--error-bg);color:var(--error)}.alert.success{background:var(--success-bg);color:var(--success)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.stat{background:var(--panel-soft);border:1px solid var(--line);border-radius:20px;padding:18px;min-height:98px}
.stat-label{color:var(--muted);font-size:13px;margin-bottom:8px}.stat-value{font-size:30px;font-weight:800;letter-spacing:.2px}
.section-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:12px 2px 14px}.section-head h2{margin:0;font-size:22px}
.groups-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.group-card{border:1px solid var(--line);border-radius:24px;overflow:hidden;background:#fff}
.group-header{padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:10px;background:linear-gradient(135deg, rgba(10,77,255,.06), rgba(31,107,255,.02));border-bottom:1px solid var(--line)}
.group-title{font-size:20px;font-weight:800}.group-meta{display:flex;gap:10px;flex-wrap:wrap}.mini-pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:7px 11px;font-size:12px;color:#374151}
.table-wrap{padding:10px 12px 14px;max-height:620px;overflow:auto} table{width:100%;border-collapse:separate;border-spacing:0 8px;table-layout:fixed}
th{text-align:left;font-size:12px;color:var(--muted);font-weight:700;padding:0 10px 6px} td{background:#fff;padding:12px 10px;font-size:13px;vertical-align:top;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
tbody tr td:first-child{border-left:1px solid var(--line);border-top-left-radius:14px;border-bottom-left-radius:14px} tbody tr td:last-child{border-right:1px solid var(--line);border-top-right-radius:14px;border-bottom-right-radius:14px}
.empresa{font-weight:700;color:#111827}.badge{display:inline-block;padding:7px 10px;border-radius:999px;background:rgba(10,77,255,.10);color:var(--blue-2);font-weight:700;font-size:12px;white-space:nowrap}
.empty{background:var(--panel-soft);border:1px dashed #cbd5e1;border-radius:24px;padding:40px 24px;text-align:center;color:var(--muted);font-size:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:var(--shadow)} .flash-list{display:grid;gap:10px;margin:0 0 14px}.login-wrap{max-width:460px;margin:60px auto}
@media (max-width:1400px){.filters form{grid-template-columns:repeat(3,minmax(0,1fr))}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.groups-grid{grid-template-columns:1fr}}
@media (max-width:980px){.app{grid-template-columns:1fr}.sidebar{position:relative;min-height:auto}.main{padding:0}}
@media (max-width:720px){.topbar{flex-direction:column}.filters form,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
<div class="brand">Controle de Créditos</div>
<nav class="menu">
<a class="menu-item {% if request.path == '/' %}active{% endif %}" href="/"><span class="menu-icon"></span>Painel</a>
<a class="menu-item {% if request.path.startswith('/admin') %}active{% endif %}" href="/admin"><span class="menu-icon"></span>Administrador</a>
</nav>
<div class="sidebar-footer">Upload único da planilha.<br>Todo mundo consulta os dados já processados.</div>
</aside>
<main class="main"><section class="panel">{% block body %}{% endblock %}</section></main>
</div>
</body>
</html>
